# ============================================================
#  APPLICATION PROPERTIES — Spring Boot auto-reads this file
# ============================================================

# --- Server ---
server.port=8095

# ============================================================
#  H2 IN-MEMORY DATABASE CONFIGURATION
# ============================================================

# JDBC URL for H2:
#   mem:cruddb  → in-memory database named "cruddb"
#   DB_CLOSE_DELAY=-1 → keep DB alive while app runs
#   DB_CLOSE_ON_EXIT=FALSE → don't close on JVM exit (useful for tests)
spring.datasource.url=jdbc:h2:mem:cruddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console: browse your in-memory DB at http://localhost:8080/h2-console
# NEVER enable this in production!
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
#  JPA / HIBERNATE CONFIGURATION
# ============================================================

# Dialect tells Hibernate which SQL flavour to generate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# DDL Auto options:
#   none        → do nothing (production default)
#   validate    → validate schema, don't change it
#   update      → update schema if needed (risky in prod)
#   create      → create schema on startup, drop on shutdown
#   create-drop → create on startup, drop on shutdown (great for tests)
spring.jpa.hibernate.ddl-auto=create-drop

# Show SQL in console — useful for learning, disable in production
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Load seed data from data.sql after schema creation
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ============================================================
#  JWT CONFIGURATION
# ============================================================

# Secret key — must be Base64-encoded, >= 256-bit (32 bytes) for HS256.
# In production, store this in an environment variable or secrets manager.
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

# Token validity: 24 hours (in milliseconds)
app.jwt.expiration-ms=86400000

# ============================================================
#  LOGGING
# ============================================================
logging.level.com.example.crud=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=DEBUG
